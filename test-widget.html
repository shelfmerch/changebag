<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CauseConn Sponsor Widget - Test Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .widget-wrapper {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .widget-container {
      position: relative;
      width: 100%;
      min-height: 600px;
    }

    #sponsor-widget-iframe {
      width: 100%;
      border: none;
      display: block;
      min-height: 600px;
    }

    .event-log {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .event-log h2 {
      margin-bottom: 1rem;
      color: #333;
      font-size: 1.5rem;
    }

    .log-entry {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }

    .log-entry.success {
      border-left-color: #10b981;
      background: #f0fdf4;
    }

    .log-entry.error {
      border-left-color: #ef4444;
      background: #fef2f2;
    }

    .log-entry .timestamp {
      color: #6b7280;
      font-size: 0.8rem;
      margin-bottom: 0.25rem;
    }

    .log-entry .type {
      font-weight: bold;
      color: #667eea;
      margin-bottom: 0.25rem;
    }

    .log-entry.success .type {
      color: #10b981;
    }

    .log-entry.error .type {
      color: #ef4444;
    }

    .log-entry .data {
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .controls {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .controls h2 {
      margin-bottom: 1rem;
      color: #333;
    }

    .control-group {
      margin-bottom: 1rem;
    }

    .control-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #555;
      font-weight: 500;
    }

    .control-group input,
    .control-group select {
      width: 100%;
      padding: 0.5rem;
      border: 2px solid #e5e7eb;
      border-radius: 6px;
      font-size: 1rem;
    }

    .control-group input:focus,
    .control-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #5568d3;
    }

    .clear-btn {
      background: #ef4444;
      margin-left: 0.5rem;
    }

    .clear-btn:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🎯 CauseConn Sponsor Widget</h1>
      <p>Test the embeddable sponsor flow widget</p>
    </div>

    <div class="controls">
      <h2>Widget Configuration</h2>
      <div class="control-group">
        <label for="causeId">Cause ID:</label>
        <input type="text" id="causeId" placeholder="Enter cause ID (optional)">
      </div>
      <div class="control-group">
        <label for="apiKey">API Key:</label>
        <input type="text" id="apiKey" placeholder="Enter API key (optional)">
      </div>
      <div class="control-group">
        <label for="affiliateId">Affiliate ID:</label>
        <input type="text" id="affiliateId" placeholder="Enter affiliate ID (optional)">
      </div>
      <div class="control-group">
        <label for="theme">Theme:</label>
        <select id="theme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <button onclick="reloadWidget()">Reload Widget</button>
    </div>

    <div class="widget-wrapper">
      <div class="widget-container">
        <iframe id="sponsor-widget-iframe" src="" allow="payment"></iframe>
      </div>
    </div>

    <div class="event-log">
      <h2>Event Log</h2>
      <button onclick="clearLog()" class="clear-btn">Clear Log</button>
      <div id="log-container"></div>
    </div>
  </div>

  <script>
    // Configuration
    const WIDGET_BASE_URL = 'http://localhost:8085'; // Change this to your widget URL

    // Initialize widget on page load
    window.addEventListener('load', () => {
      loadWidget();
    });

    // Listen for messages from the widget
    window.addEventListener('message', (event) => {
      // In production, verify the origin
      // if (event.origin !== WIDGET_BASE_URL) return;

      const { type, data } = event.data;

      logEvent(type, data);

      // Handle different event types
      switch (type) {
        case 'WIDGET_READY':
          console.log('Widget is ready');
          break;

        case 'WIDGET_RESIZE':
          const iframe = document.getElementById('sponsor-widget-iframe');
          if (data && data.height) {
            iframe.style.height = `${data.height}px`;
          }
          break;

        case 'STEP_CHANGE':
          console.log('Step changed to:', data.step);
          break;

        case 'SPONSOR_SUCCESS':
          console.log('Sponsorship successful!', data);
          alert(`Success! Sponsorship ID: ${data.sponsorshipId}`);
          break;

        case 'SPONSOR_ERROR':
          console.error('Sponsorship error:', data);
          alert(`Error: ${data.message}`);
          break;
      }
    });

    function loadWidget() {
      const causeId = document.getElementById('causeId').value;
      const apiKey = document.getElementById('apiKey').value;
      const affiliateId = document.getElementById('affiliateId').value;
      const theme = document.getElementById('theme').value;

      const params = new URLSearchParams();
      if (causeId) params.append('causeId', causeId);
      if (apiKey) params.append('apiKey', apiKey);
      if (affiliateId) params.append('affiliateId', affiliateId);
      if (theme) params.append('theme', theme);

      const widgetUrl = `${WIDGET_BASE_URL}/widget/sponsor?${params.toString()}`;
      document.getElementById('sponsor-widget-iframe').src = widgetUrl;

      logEvent('WIDGET_LOADED', { url: widgetUrl });
    }

    function reloadWidget() {
      loadWidget();
    }

    function logEvent(type, data) {
      const logContainer = document.getElementById('log-container');
      const entry = document.createElement('div');

      let className = 'log-entry';
      if (type === 'SPONSOR_SUCCESS') className += ' success';
      if (type === 'SPONSOR_ERROR') className += ' error';

      entry.className = className;
      entry.innerHTML = `
        <div class="timestamp">${new Date().toLocaleTimeString()}</div>
        <div class="type">${type}</div>
        <div class="data">${JSON.stringify(data, null, 2)}</div>
      `;

      logContainer.insertBefore(entry, logContainer.firstChild);
    }

    function clearLog() {
      document.getElementById('log-container').innerHTML = '';
    }
  </script>
</body>

</html>
